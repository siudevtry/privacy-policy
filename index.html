<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policies</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      color: #f8fafc;
      background: #080b12;
    }

    main {
      width: min(650px, 100%);
      padding: 40px;
      background: #111827;
      border: 1px solid #273244;
      border-radius: 20px;
    }

    h1 {
      margin-top: 0;
    }

    p {
      color: #aeb8c8;
      line-height: 1.7;
    }

    a {
      display: block;
      margin-top: 20px;
      padding: 18px;
      color: #ffffff;
      text-decoration: none;
      background: #1c2535;
      border: 1px solid #344158;
      border-radius: 12px;
    }

    a:hover {
      background: #263349;
    }

    span {
      display: block;
      margin-top: 6px;
      font-size: 14px;
      color: #aeb8c8;
    }
  </style>
</head>

<body>
  <main>
    <h1>Privacy Policies</h1>

    <p>
      Select a product below to view its privacy policy.
    </p>

    <a href="./orbittrail-nexus/">
      <strong>Orbittrail Nexus</strong>
      <span>View Privacy Policy</span>
    </a>
  </main>
</body>
</html>
